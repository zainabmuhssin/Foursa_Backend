<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فُرصة | جاري التحميل...</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: scroll;
        }

        html {
            scroll-behavior: smooth;
        }

        .splash-container {
            text-align: center;
            animation: fadeIn 1.2s ease-in-out;
        }

        .logo {
            font-size: 4.5rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 25px;
            letter-spacing: -2px;
        }

        .logo span {
            color: #1e293b;
        }

        /* أنيميشن اللودر */
        .loader {
            width: 45px;
            height: 45px;
            border: 5px solid #e2e8f0;
            border-top: 5px solid var(--primary-color);
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 0.8s linear infinite;
        }

        .tagline {
            margin-top: 25px;
            color: #64748b;
            font-size: 1.2rem;
            font-weight: 500;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .fade-out {
            opacity: 0;
            transition: opacity 0.6s ease-out;
        }
    </style>
</head>

<body>

    <div class="splash-container" id="splash-screen">
        <div class="logo">فُرصـ<span>ة</span></div>
        <div class="loader"></div>
        <p class="tagline">بوابتك لمستقبل مهني أفضل</p>
    </div>

    <script>
        // هذا السطر يضمن تطبيق الثيم المختار فور فتح أي صفحة
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
        }
        // هذا الكود هو المسؤول عن الربط التلقائي
        window.onload = function () {
            setTimeout(function () {
                // إضافة تأثير الاختفاء قبل الانتقال
                document.getElementById('splash-screen').classList.add('fade-out');

                setTimeout(function () {
                    // الانتقال لصفحة تسجيل الدخول
                    // تأكدي أن اسم الملف هو login.html وموجود بنفس المجلد
                    window.location.href = '/frontend/index.html';
                }, 600); // وقت إضافي بسيط لنعومة الحركة
            }, 3000); // 3000 ملي ثانية = 3 ثواني
        };
    </script>

</body>

</html>
