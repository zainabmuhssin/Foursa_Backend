<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>فُرصة | الملف الشخصي</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #e0e0e0;
            border: 4px solid white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #888;
        }

        .profile-info h1 {
            margin: 0;
            font-size: 1.8rem;
        }

        .profile-info p {
            margin: 5px 0;
            color: gray;
        }

        .skill-badge {
            background: #e3f2fd;
            color: var(--secondary);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-left: 5px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .cv-box {
            border: 2px dashed #cbd5e0;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            background: #f8fafc;
            margin-top: 20px;
            transition: 0.3s;
        }

        .cv-box:hover {
            border-color: var(--secondary);
            background: #f0f7ff;
        }

        .cv-icon {
            font-size: 2.5rem;
            color: #f44336;
            margin-bottom: 10px;
        }

        .cv-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .cv-actions button {
            min-width: 140px;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">فُرصـة</div>
            <nav>
                <a href="/frontend/home.html"><i class="fas fa-home"></i> الرئيسية</a>
                <a href="/frontend/search.html"><i class="fas fa-search"></i> البحث</a>
                <a href="/frontend/notifications.html"><i class="fas fa-bell"></i> الإشعارات</a>
                <a href="/frontend/chat.html"><i class="fas fa-comments"></i> الدردشة</a>
                <a href="/frontend/add-post.html"><i class="fas fa-plus-circle"></i> إضافة بوست</a>
                <a href="javascript:void(0)" onclick="goToProfile()"><i class="fas fa-user"></i> البروفايل</a>
                <a href="/frontend/settings.html"><i class="fas fa-cog"></i> الإعدادات</a>
            </nav>
        </aside>

        <main class="main-content">
            <h1>الملف الشخصي</h1>
            <br>

            <div class="card">
                <div class="profile-header">
                    <div class="profile-avatar" onclick="document.getElementById('imageInput').click()"
                        style="cursor: pointer; position: relative;">
                        <i class="fas fa-user" id="profileDisplay"></i>
                        <i class="fas fa-camera"
                            style="position: absolute; bottom: 5px; right: 5px; font-size: 1.2rem; color: #007bff; background: white; border-radius: 50%; padding: 5px;"></i>
                    </div>
                    <input type="file" id="imageInput" accept="image/*" style="display: none;"
                        onchange="uploadProfileImage()">

                    <div class="profile-info">
                        <h1 id="userNameDisplay">جاري التحميل...</h1>
                        <p id="userJobDisplay"><i class="fas fa-briefcase"></i> </p>
                        <p id="userLocationDisplay"><i class="fas fa-map-marker-alt"></i> </p>
                    </div>
                    <button class="btn-primary" style="margin-right: auto;"
                        onclick="window.location.href='/frontend/settings.html'">تعديل الملف الشخصي</button>
                </div>

                <hr>
                <h3>نبذة عني</h3>
                <p id="userBio" style="color: #555; line-height: 1.8;">لا توجد نبذة تعريفية مضافة حالياً.</p>

                <br>

                <h3>السيرة الذاتية (CV)</h3>
                <div class="cv-box" id="cv-status">
                    <i class="fas fa-file-pdf cv-icon"></i>
                    <p id="cv-message">جارٍ التحقق من وجود السيرة الذاتية...</p>
                    <div id="upload-container" style="display: none; margin-top: 15px;">
                        <p id="file-name" style="color: #555; margin-bottom: 15px;">لم يتم اختيار ملف بعد</p>
                        <input type="file" id="cvInput" accept=".pdf" style="display: none;"
                            onchange="updateFileName(this)">
                        <button class="btn-primary" style="margin-bottom: 10px;"
                            onclick="document.getElementById('cvInput').click()">اختر ملف PDF</button>
                        <button class="btn-primary" style="background: #4caf50;" onclick="uploadCV()">رفع السيرة
                            الذاتية</button>
                    </div>
                    <div class="cv-actions" id="cv-actions" style="display: none;">
                        <button id="view-cv-btn" class="btn-primary" style="background: #2196F3; padding: 12px 18px;">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button id="delete-cv-btn" class="btn-primary" style="background: #f44336;">
                            <i class="fas fa-trash"></i> حذف
                        </button>
                    </div>
                    <div id="cv-viewer-container" style="display: none; margin-top: 20px;">
                        <embed id="cv-viewer" src="" type="application/pdf"
                            style="width: 100%; max-width: 800px; height: 420px; border: 1px solid #ddd; border-radius: 10px;" />
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        // 1. تطبيق الثيم فوراً
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
        }

        // 2. جلب البيانات عند تحميل الصفحة
        window.onload = async function () {
            const userId = localStorage.getItem('user_id');
            if (!userId) {
                window.location.href = "/frontend/login.html";
                return;
            }

            try {
                // الرابط هنا "نظيف" بدون أي فراغات ✅
                const response = await fetch(`/auth/user/${userId}`);
                if (response.ok) {
                    const user = await response.json();

                    // تحديث النصوص في الـ HTML
                    document.getElementById('userNameDisplay').innerText = user.full_name || 'بدون اسم';

                    const infoParts = user.info ? user.info.split('|') : ['', ''];

                    // 2. توزيع البيانات على الحقول الصح
                    if (document.getElementById('userBio')) {
                        document.getElementById('userBio').innerText = infoParts[1] || 'لا توجد نبذة تعريفية مضافة حالياً.';
                    }

                    const jobDisplay = document.getElementById('userJobDisplay');
                    if (jobDisplay) {
                        jobDisplay.innerHTML = ` <i class="fas fa-briefcase"></i> ${infoParts[0] || 'باحث عن عمل'}`;
                    }

                    const locationDisplay = document.getElementById('userLocationDisplay');
                    if (locationDisplay) {
                        locationDisplay.innerHTML = ` <i class="fas fa-map-marker-alt"></i> ${user.city || 'المدينة غير محددة'}`;
                    }

                    // تحديث الصورة ✅
                    if (user.profile_image) {
                        const avatarDiv = document.querySelector('.profile-avatar');
                        avatarDiv.innerHTML = `
                        <img src="${user.profile_image}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">
                        <i class="fas fa-camera" style="position: absolute; bottom: 5px; right: 5px; font-size: 1.2rem; color: #007bff; background: white; border-radius: 50%; padding: 5px;"></i>
                    `;
                    }

                    const uploadContainer = document.getElementById('upload-container');
                    const cvActions = document.getElementById('cv-actions');
                    const cvMessage = document.getElementById('cv-message');

                    if (user.cv_path) {
                        uploadContainer.style.display = 'none';
                        showCvButtons(userId);
                    } else {
                        cvActions.style.display = 'none';
                        uploadContainer.style.display = 'block';
                        cvMessage.innerText = 'لم يتم رفع السيرة الذاتية بعد. اختر ملف ورفعه الآن.';
                    }
                }
            } catch (error) {
                console.error("خطأ في الاتصال بالسيرفر:", error);
            }
        };

        // 3. دالة رفع الصورة
        async function uploadProfileImage() {
            const fileInput = document.getElementById('imageInput');
            const userId = localStorage.getItem('user_id');
            if (!fileInput.files[0]) return;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch(`/auth/upload-avatar/${userId}`, {
                    method: 'POST',
                    body: formData
                });
                if (response.ok) {
                    alert("تم تحديث الصورة بنجاح! ✅");
                    location.reload();
                }
            } catch (error) {
                alert("فشل في رفع الصورة");
            }
        }

        function updateFileName(inputElement) {
            const fileNameDisplay = document.getElementById('file-name');
            if (inputElement.files && inputElement.files[0]) {
                fileNameDisplay.innerText = "الملف المختار: " + inputElement.files[0].name;
                fileNameDisplay.style.color = "#28a745";
            } else {
                fileNameDisplay.innerText = "لم يتم اختيار ملف بعد";
                fileNameDisplay.style.color = "#000";
            }
        }

        async function uploadCV() {
            const fileInput = document.getElementById('cvInput');
            const userId = localStorage.getItem('user_id');

            if (!fileInput.files[0]) {
                alert("يرجى اختيار ملف أولاً!");
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch(`/auth/upload-cv/${userId}`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    alert("تم رفع السيرة الذاتية بنجاح ✅");
                    showCvButtons(userId);
                    document.getElementById('upload-container').style.display = 'none';
                } else {
                    alert("فشل الرفع، تأكدي من أن الملف PDF وأن السيرفر يعمل.");
                }
            } catch (error) {
                console.error("خطأ:", error);
                alert("حدث خطأ في الاتصال بالباك إند.");
            }
        }

        // 4. إدارة عرض CV عندما يكون محفوظاً
        function showCvButtons(userId) {
            const viewBtn = document.getElementById('view-cv-btn');
            const deleteBtn = document.getElementById('delete-cv-btn');
            const actions = document.getElementById('cv-actions');
            const message = document.getElementById('cv-message');
            const viewerContainer = document.getElementById('cv-viewer-container');
            const viewer = document.getElementById('cv-viewer');

            actions.style.display = 'flex';
            message.innerText = 'السيرة الذاتية محفوظة في حسابك.';
            viewerContainer.style.display = 'none';
            viewer.src = '';

            viewBtn.onclick = function () {
                viewer.src = `/auth/download-cv/${userId}`;
                viewerContainer.style.display = 'block';
            };

            deleteBtn.onclick = function () {
                deleteCV();
            };
        }

        async function deleteCV() {
            if (!confirm("هل تأكد من حذف السيرة الذاتية؟")) {
                return;
            }

            const userId = localStorage.getItem('user_id');

            try {
                const response = await fetch(`/auth/delete-cv/${userId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert("تم حذف السيرة الذاتية بنجاح ✅");
                    location.reload();
                } else {
                    alert("فشل الحذف");
                }
            } catch (error) {
                console.error("خطأ:", error);
                alert("حدث خطأ في الاتصال بالباك إند");
            }
        }
        function goToProfile() {
            const userRole = localStorage.getItem('user_role'); // جلب الدور الذي حفظناه عند الدخول

            if (userRole === 'manager') {
                window.location.href = "/frontend/profile-employer.html"; // توجيه صاحب العمل لصفحته
            } else {
                window.location.href = "/frontend/profile.html"; // توجيه الباحث لصفحته
            }
        }
    </script>
</body>

</html>
