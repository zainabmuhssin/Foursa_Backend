<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORSA | حساب جديد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-blue: #1b3b6f;
            --indigo: #3f51b5;
            --white: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--navy-blue), var(--indigo));
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: scroll;
        }

        html {
            scroll-behavior: smooth;
        }

        .auth-card {
            background: var(--white);
            width: 500px;
            padding: 45px 40px;
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .logo-text {
            font-size: 3.2rem;
            font-weight: 900;
            color: var(--indigo);
            margin-bottom: 5px;
        }

        .welcome-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--navy-blue);
            margin-bottom: 25px;
        }

        .role-selector {
            display: flex;
            background: #eef1fb;
            padding: 6px;
            border-radius: 50px;
            margin-bottom: 25px;
            position: relative;
            height: 55px;
        }

        .role-opt {
            flex: 1;
            border: none;
            background: none;
            padding: 10px;
            font-weight: 700;
            cursor: pointer;
            z-index: 1;
            color: #7f8c8d;
            font-size: 1rem;
        }

        .role-opt.active {
            color: white;
        }

        .role-slider {
            position: absolute;
            width: calc(50% - 6px);
            height: calc(100% - 12px);
            background: var(--navy-blue);
            border-radius: 50px;
            top: 6px;
            right: 6px;
            transition: var(--transition);
            z-index: 0;
        }

        .input-group {
            text-align: right;
            margin-bottom: 18px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--navy-blue);
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 1.5px solid #d7def7;
            border-radius: 15px;
            outline: none;
            background: #f8f9ff;
            transition: var(--transition);
        }

        .btn-prime {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 20px;
            background: var(--navy-blue);
            color: white;
            font-weight: 800;
            font-size: 1.15rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 8px 20px rgba(27, 59, 111, 0.3);
            margin-top: 10px;
        }

        .btn-prime:hover {
            background: var(--indigo);
            transform: translateY(-2px);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        .footer-text a {
            color: var(--navy-blue);
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="auth-card">
        <div class="logo-text">فرصـة</div>
        <h2 class="welcome-title">إنشاء حساب جديد</h2>

        <div class="role-selector">
            <div class="role-slider" id="role-slider"></div>
            <button class="role-opt active" onclick="toggleRole('0', this, 'jobseeker')">باحث عن عمل</button>
            <button class="role-opt" onclick="toggleRole('50%', this, 'manager')">صاحب عمل</button>
        </div>

        <div class="input-group">
            <label>الاسم الكامل</label>
            <input type="text" id="full_name" placeholder="خالد محمد">
        </div>

        <div class="input-group" id="job-title-group">
            <label>العنوان الوظيفي</label>
            <input type="text" id="job_title" placeholder="مثال: مطور ويب، مصمم">
        </div>

        <div class="input-group" id="business-type-group" style="display: none;">
            <label>نوع العمل / مجال الشركة</label>
            <input type="text" id="business_type" placeholder="مثال: تقني، مقاولات، تعليم">
        </div>

        <div class="input-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="reg_email" placeholder="mail@example.com">
        </div>

        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="reg_password" placeholder="**">
        </div>

        <button class="btn-prime" onclick="registerProcess()">إنشاء الحساب</button>

        <p class="footer-text">
            لديك حساب بالفعل؟
            <a href="/frontend/login.html">تسجيل الدخول</a>
        </p>
    </div>

    <script>
        // هذا السطر يضمن تطبيق الثيم المختار فور فتح أي صفحة
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
        }
        // 1. تحديد الدور الافتراضي (باحث عن عمل)
        let currentRole = "jobseeker";

        // 2. دالة التبديل بين "باحث عن عمل" و "صاحب عمل"
        function toggleRole(pos, btn, role) {
            // تحريك الخلفية الزرقاء (السلايدر)
            document.getElementById('role-slider').style.right = pos;

            // تغيير لون النصوص للأزرار
            document.querySelectorAll('.role-opt').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // تحديث المتغير البرمجي للدور
            currentRole = role;

            // إظهار وإخفاء الحقول (العنوان الوظيفي أو مجال الشركة)
            if (role === 'jobseeker') {
                document.getElementById('job-title-group').style.display = 'block';
                document.getElementById('business-type-group').style.display = 'none';
            } else {
                document.getElementById('job-title-group').style.display = 'none';
                document.getElementById('business-type-group').style.display = 'block';
            }
        }

        // 3. دالة إرسال البيانات للباك أند (التسجيل الفعلي)
        async function registerProcess() {
            const name = document.getElementById('full_name').value;
            const email = document.getElementById('reg_email').value;
            const password = document.getElementById('reg_password').value;
            const extraInfo = (currentRole === 'jobseeker') ?
                document.getElementById('job_title').value :
                document.getElementById('business_type').value;

            if (!name || !email || !password) {
                alert("يرجى ملء الحقول الأساسية");
                return;
            }

            const userData = {
                full_name: name,
                email: email,
                password: password,
                role: currentRole,
                info: extraInfo
            };

            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                let result;
                const contentType = response.headers.get('content-type') || '';
                if (contentType.includes('application/json')) {
                    result = await response.json();
                } else {
                    const text = await response.text();
                    console.warn('Expected JSON but got:', text);
                    result = { detail: text };
                }

                if (response.ok) {
                    localStorage.setItem('user_id', result.user_id);
                    localStorage.setItem('user_role', result.role);

                    alert("تم إنشاء الحساب بنجاح! ✅");
                    if (result.role === 'manager') {
                        window.location.href = "/frontend/profile-employer.html";
                    } else {
                        window.location.href = "/frontend/home.html";
                    }
                } else {
                    alert(result.detail || "حدث خطأ أثناء إنشاء الحساب");
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                alert('حدث خطأ في الاتصال بالسيرفر. يرجى المحاولة مرة أخرى.');
            }
        }
    </script>
</body>

</html>
