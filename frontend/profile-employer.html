<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>فُرصة | بروفايل الشركة</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        /* جعل الصورة قابلة للضغط للتغيير */
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            background: #e0e0e0;
            border: 4px solid white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #888;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info h1 {
            margin: 0;
            font-size: 1.8rem;
        }

        .profile-info p {
            margin: 5px 0;
            color: gray;
        }

        .job-card {
            background: var(--white);
            /* يتغير مع الدارك مود */
            border: 1px solid #e2e8f0;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">فُرصـة</div>
            <nav>
                <a href="/frontend/home.html"><i class="fas fa-home"></i> الرئيسية</a>
                <a href="/frontend/search.html"><i class="fas fa-search"></i> البحث</a>
                <a href="/frontend/notifications.html"><i class="fas fa-bell"></i> الإشعارات</a>
                <a href="/frontend/chat.html"><i class="fas fa-comments"></i> الدردشة</a>
                <a href="/frontend/add-post.html"><i class="fas fa-plus-circle"></i> إضافة وظيفة</a>
                <a href="/frontend/applications.html"><i class="fas fa-clipboard-list"></i> الطلبات</a>
                <a href="javascript:void(0)" onclick="goToProfile()"><i class="fas fa-user"></i> البروفايل</a>
                <a href="/frontend/settings.html"><i class="fas fa-cog"></i> الإعدادات</a>
            </nav>
        </aside>

        <main class="main-content">
            <h1>بروفايل الشركة</h1>
            <br>

            <div class="card">
                <div class="profile-header">
                    <div class="profile-avatar" onclick="document.getElementById('logoInput').click()">
                        <img id="companyLogo" src="" style="display: none;">
                        <i class="fas fa-building" id="defaultIcon"></i>
                    </div>
                    <input type="file" id="logoInput" hidden accept="image/*" onchange="uploadLogo()">

                    <div class="profile-info">
                        <h1 id="displayCompanyName">جاري التحميل...</h1>
                        <p><i class="fas fa-map-marker-alt"></i> <span id="displayLocation">العراق</span></p>
                        <p><i class="fas fa-users"></i> <span id="displaySize">حجم الشركة غير محدد</span></p>
                    </div>
                    <button class="btn-primary" style="margin-right: auto;"
                        onclick="window.location.href='/frontend/settings.html'">تعديل بيانات الشركة</button>
                </div>

                <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

                <h3>عن الشركة</h3>
                <p id="displayAbout" style="color: #555; line-height: 1.8;">لا توجد نبذة تعريفية للشركة حالياً.</p>

                <br>
                <h3>الوظائف المعلنة</h3>
                <div id="jobsContainer">
                    <p style="color: gray;">لم تقم بنشر أي وظائف بعد.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 1. تطبيق الثيم (الوضع الليلي) فوراً
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
        }

        // 2. جلب بيانات الشركة عند تحميل الصفحة
        window.onload = async function () {
            const userId = localStorage.getItem('user_id');
            if (!userId) {
                window.location.href = "/frontend/login.html";
                return;
            }

            try {
                const response = await fetch(`/auth/user/${userId}`);
                if (response.ok) {
                    const data = await response.json();

                    // --- الجزء المهم: فصل البيانات المدمجة ---
                    // هنا نفترض إننا خزنّا (حجم الشركة | وصف الشركة) في حقل info
                    const infoParts = data.info ? data.info.split('|') : ['', ''];
                    const companySize = infoParts[0] || "حجم الشركة غير محدد";
                    const companyAbout = infoParts[1] || "لا توجد نبذة تعريفية للشركة حالياً.";

                    // تحديث النصوص في الصفحة
                    document.getElementById('displayCompanyName').innerText = data.full_name || "اسم الشركة";
                    document.getElementById('displaySize').innerText = companySize;
                    document.getElementById('displayAbout').innerText = companyAbout;
                    document.getElementById('displayLocation').innerText = data.city || "العراق";
                    // ---------------------------------------

                    // تحديث اللوغو إذا كان موجوداً
                    if (data.profile_image) {
                        const logoImg = document.getElementById('companyLogo');
                        logoImg.src = data.profile_image;
                        logoImg.style.display = 'block';
                        document.getElementById('defaultIcon').style.display = 'none';
                    }
                }
            } catch (error) {
                console.error("خطأ في جلب بيانات الشركة:", error);
            }
        };

        // 3. دالة رفع اللوغو (نفس دالة الباحث عن عمل)
        async function uploadLogo() {
            const fileInput = document.getElementById('logoInput');
            const userId = localStorage.getItem('user_id');

            if (!fileInput.files[0]) return;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch(`/auth/upload-avatar/${userId}`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const result = await response.json();
                    alert("تم تحديث شعار الشركة بنجاح! ✅");
                    location.reload(); // إعادة تحميل لرؤية التغيير
                } else {
                    alert("فشل رفع الشعار.");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("حدث خطأ أثناء الاتصال بالسيرفر.");
            }
        }
        function goToProfile() {
            const userRole = localStorage.getItem('user_role'); // جلب الدور الذي حفظناه عند الدخول

            if (userRole === 'manager') {
                window.location.href = "/frontend/profile-employer.html"; // توجيه صاحب العمل لصفحته
            } else {
                window.location.href = "/frontend/profile.html"; // توجيه الباحث لصفحته
            }
        }
    </script>
</body>

</html>
